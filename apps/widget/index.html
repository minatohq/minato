<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minato Widget</title>
  </head>

  <body>
    <div style="margin-bottom: 1rem">
      <button onclick="Minato('init', { projectId: 'project_123' })">Init widget</button>
      <button onclick="Minato('openPopup')">Open popup</button>
      <button onclick="Minato('closePopup')">Close popup</button>
      <button onclick="Minato('showLauncher')">Show launcher</button>
      <button onclick="Minato('hideLauncher')">Hide launcher</button>
      <button onclick="Minato('destroy')">Destroy widget</button>
      <button onclick="Minato('TEST')">Unknown command</button>
    </div>

    <div>
      <button onclick="Minato('on', 'TEST', () => {})">Unknown event</button>
      <button
        onclick="
          Minato('on', 'ready', () => {
            console.log('ready event handler')
          })
        "
      >
        `ready` event
      </button>
      <button
        onclick="
          Minato('on', 'popupOpened', () => {
            console.log('popupOpened event handler')
          })
        "
      >
        `popupOpened` event
      </button>
      <button
        onclick="
          Minato('on', 'popupClosed', () => {
            console.log('close event handler')
          })
        "
      >
        `popupClosed` event
      </button>
      <button
        onclick="
          Minato('on', 'showLauncher', () => {
            console.log('showLauncher event handler')
          })
        "
      >
        `showLauncher` event
      </button>
      <button
        onclick="
          Minato('on', 'hideLauncher', () => {
            console.log('hideLauncher event handler')
          })
        "
      >
        `hideLauncher` event
      </button>
    </div>

    <script>
      window.Minato =
        window.Minato ||
        function (...args) {
          window.Minato.q = window.Minato.q || []
          window.Minato.subscriptionCount = window.Minato.subscriptionCount || 0

          if (args[0] === 'on') {
            const subscriptionId = `s_${++window.Minato.subscriptionCount}`

            window.Minato.q.push(['on', subscriptionId, args[1], args[2]])

            return function unsubscribe() {
              window.Minato('off', subscriptionId)
            }
          }

          window.Minato.q.push(args)
        }
    </script>
    <script type="module" src="/src/bootstrap/index.ts"></script>
    <script type="module" src="/src/bootstrap/index.ts?duplicate-load"></script>
  </body>
</html>
