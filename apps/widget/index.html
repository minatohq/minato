<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedy Widget</title>
  </head>

  <body>
    <script>
      window.Feedy =
        window.Feedy ||
        function (...args) {
          window.Feedy.q = window.Feedy.q || []
          window.Feedy.subscriptionCount = window.Feedy.subscriptionCount || 0

          if (args[0] === 'on') {
            const subscriptionId = `subscription_${++window.Feedy.subscriptionCount}`

            window.Feedy.q.push(['on', subscriptionId, args[1], args[2]])

            return function unsubscribe() {
              window.Feedy('off', subscriptionId)
            }
          }

          window.Feedy.q.push(args)
        }

      Feedy('init', {
        projectId: 'project_123',
      })

      const unsubscribeFromOpen = Feedy('on', 'open', () => {
        console.log('Feedy widget opened')
      })

      Feedy('on', 'close', () => {
        console.log('Feedy widget closed')
      })

      unsubscribeFromOpen()
    </script>
    <script type="module" src="/src/bootstrap/index.ts"></script>
    <script type="module" src="/src/bootstrap/index.ts?duplicate-load"></script>
  </body>
</html>
