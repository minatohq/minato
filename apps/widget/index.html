<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedy Widget</title>
  </head>

  <body>
    <div style="margin-bottom: 1rem">
      <button onclick="Feedy('init', { projectId: 'project_123' })">Init widget</button>
      <button onclick="Feedy('open')">Open widget</button>
      <button onclick="Feedy('close')">Close widget</button>
      <button onclick="Feedy('showLauncher')">Show launcher</button>
      <button onclick="Feedy('hideLauncher')">Hide launcher</button>
      <button onclick="Feedy('destroy')">Destroy widget</button>
      <button onclick="Feedy('TEST')">Unknown command</button>
    </div>

    <div>
      <button onclick="Feedy('on', 'TEST', () => {})">Unknown event</button>
      <button
        onclick="
          Feedy('on', 'ready', () => {
            console.log('ready event handler')
          })
        "
      >
        `ready` event
      </button>
      <button
        onclick="
          Feedy('on', 'open', () => {
            console.log('open event handler')
          })
        "
      >
        `open` event
      </button>
      <button
        onclick="
          Feedy('on', 'close', () => {
            console.log('close event handler')
          })
        "
      >
        `close` event
      </button>
      <button
        onclick="
          Feedy('on', 'showLauncher', () => {
            console.log('showLauncher event handler')
          })
        "
      >
        `showLauncher` event
      </button>
      <button
        onclick="
          Feedy('on', 'hideLauncher', () => {
            console.log('hideLauncher event handler')
          })
        "
      >
        `hideLauncher` event
      </button>
    </div>

    <script>
      window.Feedy =
        window.Feedy ||
        function (...args) {
          window.Feedy.q = window.Feedy.q || []
          window.Feedy.subscriptionCount = window.Feedy.subscriptionCount || 0

          if (args[0] === 'on') {
            const subscriptionId = `subscription_${++window.Feedy.subscriptionCount}`

            window.Feedy.q.push(['on', subscriptionId, args[1], args[2]])

            return function unsubscribe() {
              window.Feedy('off', subscriptionId)
            }
          }

          window.Feedy.q.push(args)
        }
    </script>
    <script type="module" src="/src/bootstrap/index.ts"></script>
    <script type="module" src="/src/bootstrap/index.ts?duplicate-load"></script>
  </body>
</html>
