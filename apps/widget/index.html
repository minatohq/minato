    <title>Feedy Widget</title>

  <body>
    <script>
      window.Feedy =
        window.Feedy ||
        function (...args) {
          ;(window.Feedy.q = window.Feedy.q || []).push(args)
        }

      Feedy('init', {
        projectId: 'project_123',
      })

      Feedy('on', 'open', () => {
        console.log('Feedy widget opened')
      })

      Feedy('on', 'close', () => {
        console.log('Feedy widget closed')
      })
    </script>
